<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Edwin Andres Sanchez Orozco profile banner</title>
  <desc id="desc">A cyber technical banner for a software developer profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#050a13"/>
      <stop offset="52%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0b1b2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1d3147" stroke-width="1" opacity=".55"/>
      <circle cx="0" cy="0" r="1.4" fill="#67e8f9" opacity=".25"/>
    </pattern>
  </defs>
  <rect width="1200" height="340" rx="26" fill="url(#bg)"/>
  <rect x="18" y="18" width="1164" height="304" rx="22" fill="url(#grid)" opacity=".75"/>
  <path d="M78 260H274L335 199H448L499 148H670" fill="none" stroke="#67e8f9" stroke-width="3" opacity=".65" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="1 18;16 8;1 18" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M1124 88H920L868 140H742L690 192H536" fill="none" stroke="#8b5cf6" stroke-width="3" opacity=".55" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="12 10;1 18;12 10" dur="7s" repeatCount="indefinite"/>
  </path>
  <g opacity=".9">
    <rect x="74" y="74" width="168" height="36" rx="8" fill="#0f1b2d" stroke="#24364f"/>
    <text x="94" y="98" fill="#67e8f9" font-family="Consolas, monospace" font-size="15">perfil.dev</text>
    <circle cx="213" cy="92" r="5" fill="#22c55e"/>
    <circle cx="228" cy="92" r="5" fill="#67e8f9"/>
  </g>
  <text x="74" y="164" fill="#e5eefb" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="800">Edwin Andres Sanchez Orozco</text>
  <text x="78" y="207" fill="#9fb7d4" font-family="Consolas, monospace" font-size="22">Software Developer in training · Computer Engineering</text>
  <rect x="77" y="232" width="520" height="3" rx="2" fill="url(#accent)" filter="url(#glow)"/>
  <g transform="translate(850 84)">
    <rect width="236" height="172" rx="18" fill="#0a1424" stroke="#24364f"/>
    <text x="24" y="43" fill="#67e8f9" font-family="Consolas, monospace" font-size="15">build_status</text>
    <text x="24" y="78" fill="#e5eefb" font-family="Consolas, monospace" font-size="24" font-weight="700">ACTIVE</text>
    <text x="24" y="112" fill="#9fb7d4" font-family="Consolas, monospace" font-size="14">clean_code=true</text>
    <text x="24" y="138" fill="#9fb7d4" font-family="Consolas, monospace" font-size="14">learning+=1</text>
    <circle cx="198" cy="48" r="13" fill="#22c55e" filter="url(#glow)">
      <animate attributeName="opacity" values=".35;1;.35" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
