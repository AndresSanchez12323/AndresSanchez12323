name: Update profile activity

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update-activity-panel.mjs"
      - ".github/workflows/update-profile-activity.yml"

permissions:
  contents: write

jobs:
  update-activity-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate activity panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_LOGIN: AndresSanchez12323
        run: node scripts/update-activity-panel.mjs

      - name: Commit updated panel
        run: |
          if git diff --quiet -- assets/activity-panel.svg; then
            echo "Activity panel is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-panel.svg
          git commit -m "Update profile activity panel"
          git push
